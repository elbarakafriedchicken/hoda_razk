<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية | هدي رزق فرج</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'cairo': ['Cairo', 'sans-serif'],
                        'amiri': ['Amiri', 'serif'],
                    },
                    colors: {
                        gold: {
                            light: '#f1c40f',
                            DEFAULT: '#d4af37',
                            dark: '#b8860b',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        .quran-font { font-family: 'Amiri', serif; line-height: 2.2; }
        
        .gold-text {
            color: #d4af37;
        }

        .section-content { display: none; }
        .section-content.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-card.active {
            background: #d4af37;
            color: white !important;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .share-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
            backdrop-filter: blur(8px);
        }

        /* تحسين مظهر شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">

    <!-- Toast Notification -->
    <div id="shareToast" class="share-toast bg-slate-800/90 px-6 py-3 rounded-xl text-white font-bold shadow-2xl">
        ✅ تم نسخ رابط الصدقة لـ هدي رزق فرج
    </div>

    <!-- Header -->
    <header class="py-10 text-center border-b border-slate-100 dark:border-slate-800 bg-gradient-to-b from-slate-50 to-white dark:from-slate-900 dark:to-slate-950">
        <h1 class="text-4xl font-bold gold-text mb-3">هدي رزق فرج</h1>
        <p class="text-slate-500 dark:text-slate-400 text-lg max-w-md mx-auto px-4">اللهم اغفر لها وارحمها واجعل قبرها روضة من رياض الجنة</p>
        
        <div class="flex justify-center gap-4 mt-8">
            <button onclick="toggleDarkMode()" class="w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center justify-center text-gold hover:scale-110 transition-transform">
                <i id="themeIcon" class="fas fa-moon"></i>
            </button>
            <button onclick="shareApp()" class="w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center justify-center text-gold hover:scale-110 transition-transform">
                <i class="fas fa-share-alt"></i>
            </button>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
        <div class="container mx-auto px-4 flex justify-center py-4 gap-2 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('quran')" id="tab-quran" class="nav-card active px-6 py-2.5 rounded-xl font-bold transition-all text-slate-600 dark:text-slate-400">
                <i class="fas fa-quran ml-2"></i>القرآن
            </button>
            <button onclick="switchTab('audio')" id="tab-audio" class="nav-card px-6 py-2.5 rounded-xl font-bold transition-all text-slate-600 dark:text-slate-400">
                <i class="fas fa-volume-up ml-2"></i>استماع
            </button>
            <button onclick="switchTab('azkar')" id="tab-azkar" class="nav-card px-6 py-2.5 rounded-xl font-bold transition-all text-slate-600 dark:text-slate-400">
                <i class="fas fa-pray ml-2"></i>الأذكار
            </button>
            <button onclick="switchTab('rosary')" id="tab-rosary" class="nav-card px-6 py-2.5 rounded-xl font-bold transition-all text-slate-600 dark:text-slate-400">
                <i class="fas fa-beads ml-2"></i>مسبحة
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-5xl">

        <!-- Quran Reading -->
        <section id="quran" class="section-content active">
            <div id="surahGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Surahs generated via JS -->
            </div>
            <div id="quranReader" class="hidden">
                <button onclick="closeReader()" class="mb-8 flex items-center text-gold font-bold hover:underline">
                    <i class="fas fa-arrow-right ml-2"></i> عودة لقائمة السور
                </button>
                <div class="bg-slate-50 dark:bg-slate-900 p-6 md:p-12 rounded-3xl shadow-inner border border-slate-100 dark:border-slate-800">
                    <h3 id="surahTitleDisplay" class="text-3xl text-center gold-text mb-10 font-amiri"></h3>
                    <div id="ayahContainer" class="quran-font text-3xl text-right leading-[2.8] text-slate-800 dark:text-slate-200"></div>
                </div>
            </div>
        </section>

        <!-- Audio Player -->
        <section id="audio" class="section-content">
            <div class="max-w-2xl mx-auto bg-slate-50 dark:bg-slate-900 rounded-3xl p-8 md:p-12 shadow-sm">
                <div class="grid md:grid-cols-2 gap-6 mb-10">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">اختر القارئ</label>
                        <select id="reciterSelect" onchange="changeReciter()" class="w-full p-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-gold/20">
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">اختر السورة</label>
                        <select id="audioSurahSelect" onchange="loadAudio()" class="w-full p-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-gold/20">
                        </select>
                    </div>
                </div>

                <div class="text-center py-6">
                    <div id="nowPlayingSurah" class="text-3xl font-bold gold-text mb-2">اختر سورة</div>
                    <div id="nowPlayingReciter" class="text-slate-500 dark:text-slate-400 mb-10">للبدء بالاستماع</div>
                    
                    <div class="w-full mb-8">
                        <input type="range" id="audioTimeline" class="w-full accent-gold h-1.5 cursor-pointer" value="0">
                        <div class="flex justify-between text-xs text-slate-400 mt-3 font-mono">
                            <span id="audioCurrent">00:00</span>
                            <span id="audioTotal">00:00</span>
                        </div>
                    </div>

                    <button onclick="togglePlay()" id="playBtn" class="w-24 h-24 rounded-full bg-gold text-white text-4xl shadow-xl hover:scale-105 active:scale-95 transition-all">
                        <i class="fas fa-play ml-1"></i>
                    </button>
                    <audio id="audioEngine"></audio>
                </div>
            </div>
        </section>

        <!-- Azkar -->
        <section id="azkar" class="section-content">
            <div class="flex justify-center flex-wrap gap-3 mb-10">
                <button id="btn-morning" onclick="loadAzkar('morning')" class="azkar-nav px-8 py-3 rounded-full font-bold bg-slate-100 dark:bg-slate-800 transition-colors">أذكار الصباح</button>
                <button id="btn-evening" onclick="loadAzkar('evening')" class="azkar-nav px-8 py-3 rounded-full font-bold bg-slate-100 dark:bg-slate-800 transition-colors">أذكار المساء</button>
                <button id="btn-dead" onclick="loadAzkar('dead')" class="azkar-nav px-8 py-3 rounded-full font-bold bg-slate-100 dark:bg-slate-800 transition-colors">أدعية لـ هدي رزق</button>
            </div>
            <div id="azkarList" class="grid gap-4 max-w-3xl mx-auto"></div>
        </section>

        <!-- Rosary -->
        <section id="rosary" class="section-content">
            <div class="max-w-sm mx-auto text-center p-10 bg-slate-50 dark:bg-slate-900 rounded-[3rem] shadow-sm border border-slate-100 dark:border-slate-800">
                <select id="rosaryMode" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-800 mb-10 font-bold text-center border-none shadow-sm outline-none">
                    <option>سبحان الله</option>
                    <option>الحمد لله</option>
                    <option>لا إله إلا الله</option>
                    <option>الله أكبر</option>
                    <option>استغفر الله</option>
                    <option>اللهم صلِ على محمد</option>
                </select>
                
                <div class="text-7xl font-bold gold-text mb-12 py-8 tracking-tighter" id="rosaryCount">0</div>

                <button onclick="incrementRosary()" class="w-full py-10 bg-gold text-white rounded-[2rem] text-3xl font-bold shadow-xl active:scale-95 transition-all mb-6">
                    تسبيح
                </button>
                <button onclick="resetRosary()" class="text-slate-400 hover:text-red-400 transition-colors text-sm font-semibold uppercase tracking-widest">إعادة العداد</button>
            </div>
        </section>

    </main>

    <footer class="py-16 text-center border-t border-slate-100 dark:border-slate-800 mt-20">
        <div class="mb-4 text-gold opacity-50"><i class="fas fa-heart text-2xl"></i></div>
        <p class="text-slate-500 dark:text-slate-400 font-bold">صدقة جارية عن روح الفقيدة هدي رزق فرج</p>
        <p class="text-slate-400 dark:text-slate-600 text-xs mt-2">نسألكم الدعاء لها بالرحمة والمغفرة</p>
    </footer>

    <script>
        const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

        const reciters = [
            { name: "مشاري العفاسي", server: "https://server8.mp3quran.net/afs/" },
            { name: "عبد الباسط عبد الصمد", server: "https://server7.mp3quran.net/basit/" },
            { name: "ماهر المعيقلي", server: "https://server12.mp3quran.net/maher/" },
            { name: "ياسر الدوسري", server: "https://server11.mp3quran.net/yasser/" },
            { name: "محمد صديق المنشاوي", server: "https://server10.mp3quran.net/minsh/" }
        ];

        const azkarData = {
            morning: [
                {t:"آية الكرسي: (اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...)",n:1},
                {t:"سورة الإخلاص والمعوذتين",n:3},
                {t:"أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له",n:1},
                {t:"اللهم بك أصبحنا، وبك أمسينا، وبك نحيا، وبك نموت، وإليك النشور",n:1},
                {t:"بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم",n:3}
            ],
            evening: [
                {t:"آية الكرسي: (اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...)",n:1},
                {t:"سورة الإخلاص والمعوذتين",n:3},
                {t:"أمسينا وأمسى الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له",n:1},
                {t:"أعوذ بكلمات الله التامات من شر ما خلق",n:3},
                {t:"يا حي يا قيوم برحمتك أستغيث أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين",n:1}
            ],
            dead: [
                {t:"اللهم اغفر لها وارحمها، وعافها واعف عنها، وأكرم نزلها، ووسع مدخلها",n:1},
                {t:"اللهم اجعل قبرها روضة من رياض الجنة، ولا تجعله حفرة من حفر النار",n:1},
                {t:"اللهم إن كانت محسنة فزد في إحسانها، وإن كانت مسيئة فتجاوز عن سيئاتها",n:1},
                {t:"اللهم ثبته عند السؤال، اللهم ارزقها الفردوس الأعلى من الجنة",n:1},
                {t:"اللهم اجعل عملها هذا صدقة جارية ترفع بها درجاتها",n:1}
            ]
        };

        function init() {
            renderSurahGrid();
            fillSelects();
            loadAzkar('morning');
            document.getElementById('rosaryCount').innerText = localStorage.getItem('rosaryCount_hoda') || 0;
            
            // تهيئة الوضع الليلي بناءً على تفضيل النظام
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                toggleDarkMode();
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function switchTab(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-card').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderSurahGrid() {
            const grid = document.getElementById('surahGrid');
            surahNames.forEach((name, i) => {
                grid.innerHTML += `
                    <div onclick="readSurah(${i+1}, '${name}')" class="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border-2 border-transparent hover:border-gold/30 hover:bg-white dark:hover:bg-slate-800 cursor-pointer text-center transition-all group">
                        <div class="text-[10px] text-slate-400 mb-1 font-bold group-hover:text-gold">${i+1}</div>
                        <div class="font-bold text-sm">سورة ${name}</div>
                    </div>
                `;
            });
        }

        async function readSurah(id, name) {
            document.getElementById('surahGrid').classList.add('hidden');
            document.getElementById('quranReader').classList.remove('hidden');
            document.getElementById('surahTitleDisplay').innerText = `سورة ${name}`;
            const container = document.getElementById('ayahContainer');
            container.innerHTML = `<div class="text-center text-gold py-10"><i class="fas fa-spinner fa-spin mr-2"></i> جاري تحميل السورة...</div>`;
            
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                // إزالة البسملة من أول السورة إذا لم تكن الفاتحة (لتجنب التكرار في العرض)
                let ayahs = data.data.ayahs;
                container.innerHTML = ayahs.map(a => `<span class="hover:text-gold transition-colors">${a.text} <span class="text-gold font-sans text-xl mx-1">﴿${a.numberInSurah}﴾</span></span>`).join(' ');
            } catch (e) { 
                container.innerHTML = `<div class="text-red-400 text-center">عذراً، حدث خطأ في الاتصال. يرجى المحاولة لاحقاً.</div>`; 
            }
        }

        function closeReader() {
            document.getElementById('quranReader').classList.add('hidden');
            document.getElementById('surahGrid').classList.remove('hidden');
        }

        function fillSelects() {
            const rSel = document.getElementById('reciterSelect');
            const sSel = document.getElementById('audioSurahSelect');
            reciters.forEach((r, i) => rSel.innerHTML += `<option value="${i}">${r.name}</option>`);
            surahNames.forEach((n, i) => {
                const val = (i+1).toString().padStart(3, '0');
                sSel.innerHTML += `<option value="${val}">سورة ${n}</option>`;
            });
        }

        const audio = document.getElementById('audioEngine');
        function loadAudio() {
            const r = reciters[document.getElementById('reciterSelect').value];
            const s = document.getElementById('audioSurahSelect').value;
            audio.src = `${r.server}${s}.mp3`;
            document.getElementById('nowPlayingSurah').innerText = `سورة ${surahNames[parseInt(s)-1]}`;
            document.getElementById('nowPlayingReciter').innerText = r.name;
            audio.play().catch(e => console.log("User must interact first"));
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if(!audio.src) { loadAudio(); return; }
            if(audio.paused) { 
                audio.play(); 
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>'; 
            } else { 
                audio.pause(); 
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play ml-1"></i>'; 
            }
        }

        function changeReciter() { if(audio.src) loadAudio(); }

        audio.ontimeupdate = () => {
            if(!audio.duration) return;
            document.getElementById('audioTimeline').value = (audio.currentTime / audio.duration) * 100;
            document.getElementById('audioCurrent').innerText = formatTime(audio.currentTime);
            document.getElementById('audioTotal').innerText = formatTime(audio.duration);
        };

        // النقر على شريط التقدم لتغيير وقت الصوت
        document.getElementById('audioTimeline').oninput = function() {
            if(audio.duration) {
                audio.currentTime = (this.value / 100) * audio.duration;
            }
        };

        function formatTime(s) {
            const m = Math.floor(s/60), sec = Math.floor(s%60);
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        function loadAzkar(cat) {
            document.querySelectorAll('.azkar-nav').forEach(b => {
                b.classList.remove('bg-gold', 'text-white', 'shadow-lg');
                b.classList.add('bg-slate-100', 'dark:bg-slate-800');
            });
            const activeBtn = document.getElementById(`btn-${cat}`);
            activeBtn.classList.remove('bg-slate-100', 'dark:bg-slate-800');
            activeBtn.classList.add('bg-gold', 'text-white', 'shadow-lg');
            
            document.getElementById('azkarList').innerHTML = azkarData[cat].map(a => `
                <div class="bg-slate-50 dark:bg-slate-900 p-6 rounded-2xl flex justify-between items-center group hover:bg-white dark:hover:bg-slate-800 transition-all border border-transparent hover:border-slate-100 dark:hover:border-slate-700">
                    <p class="text-xl quran-font text-slate-700 dark:text-slate-200">${a.t}</p>
                    <button onclick="countZikr(this)" class="w-12 h-12 rounded-full border-2 border-gold text-gold font-bold shrink-0 ml-4 transition-all hover:bg-gold hover:text-white flex items-center justify-center">${a.n}</button>
                </div>
            `).join('');
        }

        function countZikr(btn) {
            let n = parseInt(btn.innerText);
            if(n > 1) {
                btn.innerText = n - 1;
            } else { 
                btn.innerHTML = '<i class="fas fa-check"></i>'; 
                btn.classList.add('bg-gold','text-white'); 
            }
        }

        function incrementRosary() {
            let c = parseInt(document.getElementById('rosaryCount').innerText) + 1;
            document.getElementById('rosaryCount').innerText = c;
            localStorage.setItem('rosaryCount_hoda', c);
            
            // تأثير اهتزاز بسيط (إذا كان متاحاً)
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function resetRosary() {
            if(confirm("هل تريد تصفير العداد؟")) {
                document.getElementById('rosaryCount').innerText = 0;
                localStorage.setItem('rosaryCount_hoda', 0);
            }
        }

        function shareApp() {
            const shareTitle = "صدقة جارية عن روح هدي رزق فرج";
            const shareUrl = window.location.href;
            
            if (navigator.share) {
                navigator.share({
                    title: shareTitle,
                    url: shareUrl
                });
            } else {
                navigator.clipboard.writeText(`${shareTitle}: ${shareUrl}`).then(() => {
                    const toast = document.getElementById('shareToast');
                    toast.style.display = 'block';
                    setTimeout(() => toast.style.display = 'none', 3000);
                });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
